version: '3.1'

networks:
  fichajes_network:
    driver: bridge

services:
  db:
    container_name: fichajespi_db
    image: 'linuxserver/mariadb:10.5.13'
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=fichajesP0l1root #Cambiar password si se desea
      - TZ=Europe/Madrid
      - MYSQL_DATABASE=db_fichajespi
      - MYSQL_USER=fichajes #Cambiar usuario si se desea
      - MYSQL_PASSWORD=fichajesP0l1 #Cambiar password si se desea
    restart: always
    networks:
      - fichajes_network

  backendserver:
    container_name: fichajespi_back
    build: ./spring-boot_fichajesPi/
    environment:
      - TZ=Europe/Madrid
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/db_fichajespi
      - SPRING_DATASOURCE_USERNAME=fichajes #Usar mismo usuario que la base de datos
      - SPRING_DATASOURCE_PASSWORD=fichajesP0l1 #Usar misma contraseña que la base de datos
      - CLIENT_URL=http://localhost
      - SPRING_MAIL_HOST=smtp.gmail.com #poner dominio del servidor smtp
      - SPRING_MAIL_PORT=587 #poner puerto del servidor smtp
      - SPRING_MAIL_USERNAME=automatizacionpoliribaroja@gmail.com
      - SPRING_MAIL_PASSWORD=deqp uuxq sknn zihi
      - JWT_SECRET=JWTPoliSecret
    ports:
      - "8080:8080"
    links:
      - "db"
    depends_on:
      - "db"
    restart: always
    networks:
      - fichajes_network

  frontend:
    container_name: fichajespi_front
    build:
      context: ./angular_fichajesPi/
      args:
        - apiURL=http://localhost:8080
    ports:
      - "80:80"
    environment:
      - TZ=Europe/Madrid
    restart: always
    networks:
      - fichajes_network
      
